<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>vmpas — RAD durable workflow builder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/pascal/pascal.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.4 system-ui, sans-serif; color: #1b1f24; background: #f5f6f8; }
  header { background: #1b2330; color: #fff; padding: 10px 16px; display: flex; gap: 14px; align-items: center; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .sp { flex: 1; }
  header input { width: 90px; padding: 4px 6px; border-radius: 4px; border: 1px solid #3a4658; }
  button { cursor: pointer; border: 0; border-radius: 5px; padding: 6px 12px; font: inherit; background: #2d6cdf; color: #fff; }
  button.alt { background: #475569; }
  button.ok { background: #1f9d57; }
  button.no { background: #d14545; }
  button:disabled { opacity: .5; cursor: default; }
  #wrap { display: grid; grid-template-columns: 150px 1fr 380px; height: calc(100vh - 49px); }
  #palette { background: #eceef1; border-right: 1px solid #d7dbe0; padding: 10px; }
  #palette h2 { font-size: 11px; text-transform: uppercase; color: #6b7280; margin: 4px 0 8px; }
  .tool { background: #fff; border: 1px solid #cfd4da; border-radius: 6px; padding: 7px 9px; margin-bottom: 7px; cursor: grab; font-weight: 500; }
  .tool small { display: block; color: #8a929c; font-weight: 400; font-size: 11px; }
  #canvas { position: relative; overflow: auto; background:
      linear-gradient(#e9ebee 1px, transparent 1px) 0 0/22px 22px,
      linear-gradient(90deg, #e9ebee 1px, transparent 1px) 0 0/22px 22px, #f5f6f8; }
  svg#edges { position: absolute; inset: 0; width: 4000px; height: 4000px; pointer-events: none; }
  .node { position: absolute; width: 230px; background: #fff; border: 1px solid #cfd4da;
          border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .node.sel { border-color: #2d6cdf; box-shadow: 0 0 0 2px #bcd2f7; }
  .node .hd { padding: 6px 9px; border-radius: 8px 8px 0 0; color: #fff; font-weight: 600; cursor: grab;
              display: flex; justify-content: space-between; align-items: center; }
  .node .hd .x { cursor: pointer; opacity: .8; }
  .node .bd { padding: 8px 9px; }
  .node .bd label { font-size: 11px; color: #6b7280; }
  .node .bd input { width: 100%; padding: 4px 6px; border: 1px solid #d7dbe0; border-radius: 4px; margin: 2px 0 6px; }
  .node pre { margin: 0; background: #f3f4f6; border-radius: 5px; padding: 6px 8px; font-size: 11px;
              white-space: pre-wrap; color: #334155; max-height: 120px; overflow: auto; }
  .t-start .hd { background: #1f9d57; } .t-log .hd { background: #475569; }
  .t-threshold .hd { background: #b8860b; } .t-approval .hd { background: #c0392b; }
  .t-approved .hd { background: #2d6cdf; } .t-custom .hd { background: #6d28d9; }
  .t-end .hd { background: #0f172a; }
  #side { border-left: 1px solid #d7dbe0; background: #fff; display: flex; flex-direction: column; }
  #side h2 { font-size: 11px; text-transform: uppercase; color: #6b7280; margin: 10px 12px 4px; }
  #side .CodeMirror { height: 240px; border-top: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; font-size: 12px; }
  #out { flex: 1; overflow: auto; padding: 10px 12px; white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 12px; }
  #status { padding: 8px 12px; border-top: 1px solid #e5e7eb; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .pill.done { background: #dcfce7; color: #166534; } .pill.paused { background: #fef3c7; color: #92400e; }
  .pill.error { background: #fee2e2; color: #991b1b; }
  .cm-inline .CodeMirror { height: 110px; border: 1px solid #e5e7eb; border-radius: 5px; font-size: 11px; }
  .node[data-status="done"]   { box-shadow: 0 0 0 2px #1f9d57; }
  .node[data-status="paused"] { box-shadow: 0 0 0 3px #f59e0b; animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 3px #f59e0b; } 50% { box-shadow: 0 0 0 6px #fde68a; } }
  .st { font-size: 13px; }
  .runrow { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 3px 0; }
</style>
</head>
<body>
<header>
  <h1>vmpas · RAD durable workflow</h1>
  <input id="flowName" placeholder="flow name" value="expense-approval" style="width:150px">
  <button class="alt" id="save">Save</button>
  <select id="load" class="alt" style="padding:5px;border-radius:5px"><option value="">Load…</option></select>
  <span class="sp"></span>
  <label>amount&nbsp;<input id="amount" type="number" value="2500" step="100"></label>
  <button id="run">▶ Run</button>
</header>

<div id="wrap">
  <div id="palette">
    <h2>Drag a box →</h2>
    <div class="tool" draggable="true" data-type="log">Log<small>WriteLn message</small></div>
    <div class="tool" draggable="true" data-type="threshold">Threshold<small>auto-approve if low</small></div>
    <div class="tool" draggable="true" data-type="approval">Approval<small>Suspend (durable)</small></div>
    <div class="tool" draggable="true" data-type="approved">Set approved<small>outcome := approved</small></div>
    <div class="tool" draggable="true" data-type="custom">Custom Pascal<small>your own code</small></div>
    <h2>order = top→bottom</h2>
  </div>

  <div id="canvas">
    <svg id="edges"></svg>
  </div>

  <div id="side">
    <h2>Generated Pascal program</h2>
    <textarea id="prog"></textarea>
    <h2>Output</h2>
    <div id="out">Run the flow to see output…</div>
    <div id="status"></div>
    <h2>Recent runs (SQLite)</h2>
    <div id="runs" style="max-height:140px;overflow:auto;padding:0 12px 10px;font-size:12px"></div>
  </div>
</div>

<script>
const TYPES = {
  start:    { title: "Start",        fixed: true },
  log:      { title: "Log",          msg: "Evaluating expense" },
  threshold:{ title: "Threshold",    limit: "1000" },
  approval: { title: "Approval",     fixed: false },
  approved: { title: "Set approved", fixed: false },
  custom:   { title: "Custom Pascal", code: "WriteLn('custom step');" },
  end:      { title: "End",          fixed: true },
};

let nodes = [];
let nid = 0;
let selected = null;
const cmEditors = {}; // node id -> CodeMirror for custom boxes

function add(type, x, y, params) {
  const def = TYPES[type];
  const n = { id: "n" + (++nid), type, x, y, params: Object.assign({}, def, params || {}) };
  nodes.push(n);
  return n;
}

// Flow order is the vertical position of the boxes (top to bottom).
function ordered() { return [...nodes].sort((a, b) => a.y - b.y || a.x - b.x); }

// --- Pascal generation -------------------------------------------------------
function pascalFor(n) {
  const p = n.params;
  switch (n.type) {
    case "start":     return "outcome := '';";
    case "log":       return "WriteLn('" + esc(p.msg) + "');";
    case "threshold": return "if amount <= " + (parseFloat(p.limit) || 0).toFixed(2) +
                             " then\n  begin outcome := 'auto-approved';\n        WriteLn('Auto-approved'); Halt end;";
    case "approval":  return "WriteLn('Awaiting approval...');\nSuspend('approval');\n" +
                             "if not approved then\n  begin outcome := 'rejected'; WriteLn('Rejected'); Halt end;";
    case "approved":  return "outcome := 'approved';\nWriteLn('Approved');";
    case "custom":    return (p.code || "").trim();
    case "end":       return "WriteLn('Result: ', outcome);";
  }
  return "";
}
function esc(s) { return String(s).replace(/'/g, "''"); }

function compose() {
  // Each box is prefixed with Trace('<id>') so the backend reports, live, which
  // box ran (a bound Go callback) — the logic shown on the box stays clean.
  const body = ordered().map(n => indent("Trace('" + n.id + "');\n" + pascalFor(n))).join("\n");
  return "program Flow;\n" +
         "var amount: Currency; approved: Boolean; outcome: string;\n" +
         "begin\n" + body + "\nend.";
}
function indent(s) { return s.split("\n").map(l => "  " + l).join("\n"); }

// --- Rendering ---------------------------------------------------------------
const canvas = document.getElementById("canvas");
const svg = document.getElementById("edges");
let progCM;

function render() {
  // nodes
  const ids = new Set(nodes.map(n => n.id));
  document.querySelectorAll(".node").forEach(el => { if (!ids.has(el.dataset.id)) el.remove(); });
  for (const n of nodes) renderNode(n);
  drawEdges();
  progCM.setValue(compose());
}

function renderNode(n) {
  let el = document.querySelector('.node[data-id="' + n.id + '"]');
  const def = TYPES[n.type];
  if (!el) {
    el = document.createElement("div");
    el.className = "node t-" + n.type;
    el.dataset.id = n.id;
    el.innerHTML = '<div class="hd"></div><div class="bd"></div>';
    canvas.appendChild(el);
    el.querySelector(".hd").addEventListener("mousedown", e => startDrag(e, n));
    el.addEventListener("mousedown", () => select(n));
  }
  el.style.left = n.x + "px";
  el.style.top = n.y + "px";
  el.classList.toggle("sel", selected === n);
  const hd = el.querySelector(".hd");
  const badge = n.status === "done" ? " ✓" : n.status === "paused" ? " ⏸" : "";
  hd.innerHTML = '<span>' + def.title + '<b class="st">' + badge + '</b></span>' +
                 (def.fixed ? '' : '<span class="x" title="delete">✕</span>');
  el.dataset.status = n.status || "";
  const x = hd.querySelector(".x");
  if (x) x.addEventListener("click", ev => { ev.stopPropagation(); remove(n); });

  const bd = el.querySelector(".bd");
  bd.innerHTML = "";
  if (n.type === "log") field(bd, n, "msg", "message");
  if (n.type === "threshold") field(bd, n, "limit", "auto-approve if amount <=");
  if (n.type === "custom") {
    const ta = document.createElement("textarea");
    bd.classList.add("cm-inline");
    bd.appendChild(ta);
    const cm = CodeMirror.fromTextArea(ta, { mode: "text/x-pascal", lineNumbers: false });
    cm.setValue(n.params.code || "");
    cm.on("change", () => { n.params.code = cm.getValue(); progCM.setValue(compose()); });
    cmEditors[n.id] = cm;
  } else {
    const pre = document.createElement("pre");
    pre.textContent = pascalFor(n);
    bd.appendChild(pre);
  }
}

function field(bd, n, key, label) {
  const l = document.createElement("label"); l.textContent = label; bd.appendChild(l);
  const i = document.createElement("input"); i.value = n.params[key];
  i.addEventListener("input", () => { n.params[key] = i.value; refreshPre(n); progCM.setValue(compose()); });
  bd.appendChild(i);
  const pre = document.createElement("pre"); pre.textContent = pascalFor(n); bd.appendChild(pre);
}
function refreshPre(n) {
  const el = document.querySelector('.node[data-id="' + n.id + '"] pre');
  if (el) el.textContent = pascalFor(n);
}

function drawEdges() {
  const seq = ordered();
  let s = "";
  for (let i = 0; i + 1 < seq.length; i++) {
    const a = seq[i], b = seq[i + 1];
    const x1 = a.x + 115, y1 = a.y + 70, x2 = b.x + 115, y2 = b.y;
    s += '<path d="M' + x1 + ' ' + y1 + ' C ' + x1 + ' ' + (y1 + 40) + ' ' + x2 + ' ' + (y2 - 40) +
         ' ' + x2 + ' ' + y2 + '" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr)"/>';
  }
  svg.innerHTML = '<defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto">' +
                  '<path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker></defs>' + s;
}

function select(n) { selected = n; document.querySelectorAll(".node").forEach(e => e.classList.toggle("sel", e.dataset.id === n.id)); }
function remove(n) { nodes = nodes.filter(x => x !== n); if (selected === n) selected = null; render(); }

// --- Dragging ----------------------------------------------------------------
let drag = null;
function startDrag(e, n) {
  drag = { n, dx: e.clientX - n.x, dy: e.clientY - n.y };
  e.preventDefault();
}
window.addEventListener("mousemove", e => {
  if (!drag) return;
  drag.n.x = Math.max(0, e.clientX - drag.dx);
  drag.n.y = Math.max(0, e.clientY - drag.dy);
  const el = document.querySelector('.node[data-id="' + drag.n.id + '"]');
  el.style.left = drag.n.x + "px"; el.style.top = drag.n.y + "px";
  drawEdges();
});
window.addEventListener("mouseup", () => { if (drag) { drag = null; progCM.setValue(compose()); } });

// --- Palette drag-and-drop ---------------------------------------------------
document.querySelectorAll(".tool").forEach(t => {
  t.addEventListener("dragstart", e => e.dataTransfer.setData("type", t.dataset.type));
});
canvas.addEventListener("dragover", e => e.preventDefault());
canvas.addEventListener("drop", e => {
  e.preventDefault();
  const type = e.dataTransfer.getData("type");
  if (!type) return;
  const r = canvas.getBoundingClientRect();
  add(type, e.clientX - r.left + canvas.scrollLeft - 115, e.clientY - r.top + canvas.scrollTop - 20);
  render();
});

// --- Run / resume ------------------------------------------------------------
const out = document.getElementById("out");
const statusEl = document.getElementById("status");
let pausedId = null;

async function post(url, body) {
  const r = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  return r.json();
}
function clearStatus() { nodes.forEach(n => n.status = ""); nodes.forEach(renderNode); }
function markTrace(trace, paused) {
  (trace || []).forEach(id => { const n = nodes.find(x => x.id === id); if (n) n.status = "done"; });
  if (paused) { const ap = nodes.find(n => n.type === "approval"); if (ap) ap.status = "paused"; }
  nodes.forEach(renderNode);
}

function show(res) {
  out.textContent = res.output || "(no output)";
  markTrace(res.trace, res.status === "paused");
  if (res.status === "paused") {
    pausedId = res.id;
    statusEl.innerHTML = '<span class="pill paused">paused: ' + res.tag + '</span> ' +
      '<button class="ok" id="ap">Approve</button> <button class="no" id="rj">Reject</button>';
    document.getElementById("ap").onclick = () => decide(true);
    document.getElementById("rj").onclick = () => decide(false);
  } else if (res.status === "error") {
    statusEl.innerHTML = '<span class="pill error">error</span> ' + (res.error || "");
  } else {
    statusEl.innerHTML = '<span class="pill done">done</span> outcome: <b>' + (res.outcome || "—") + '</b>';
  }
  loadRuns();
}

// --- Persistence (SQLite via the backend) ------------------------------------
async function saveFlow() {
  const name = document.getElementById("flowName").value.trim() || "untitled";
  const graph = JSON.stringify({ nodes });
  await post("/api/flows", { name, graph });
  loadFlowList();
}
async function loadFlowList() {
  const list = await (await fetch("/api/flows")).json();
  const sel = document.getElementById("load");
  sel.innerHTML = '<option value="">Load…</option>' +
    list.map(f => '<option value="' + f.name + '">' + f.name + '</option>').join("");
}
async function loadFlow(name) {
  if (!name) return;
  const g = await (await fetch("/api/flow?name=" + encodeURIComponent(name))).json();
  Object.values(cmEditors).forEach(cm => cm.toTextArea && cm.toTextArea());
  for (const k in cmEditors) delete cmEditors[k];
  document.querySelectorAll(".node").forEach(e => e.remove());
  nodes = g.nodes || [];
  nid = nodes.reduce((m, n) => Math.max(m, +n.id.slice(1) || 0), 0);
  document.getElementById("flowName").value = name;
  render();
}
async function loadRuns() {
  const list = await (await fetch("/api/runs")).json();
  document.getElementById("runs").innerHTML = list.map(r =>
    '<div class="runrow"><span>' + (r.flow || "(flow)") + ' · <b>' + r.status + '</b> ' +
    (r.outcome || "") + '</span><span style="color:#94a3b8">' + (r.created || "").slice(11, 19) + '</span></div>'
  ).join("") || '<span style="color:#94a3b8">no runs yet</span>';
}
async function decide(ok) {
  statusEl.textContent = "resuming…";
  show(await post("/api/resume", { id: pausedId, approved: ok }));
}
document.getElementById("run").onclick = async () => {
  statusEl.textContent = "running…"; pausedId = null; clearStatus();
  const amount = parseFloat(document.getElementById("amount").value) || 0;
  const flow = document.getElementById("flowName").value.trim();
  show(await post("/api/run", { program: compose(), amount, flow }));
};
document.getElementById("save").onclick = saveFlow;
document.getElementById("load").onchange = e => loadFlow(e.target.value);

// --- Boot: a starter flow ----------------------------------------------------
progCM = CodeMirror.fromTextArea(document.getElementById("prog"), {
  mode: "text/x-pascal", lineNumbers: true, readOnly: true,
});
add("start", 40, 20);
add("log", 40, 130, { msg: "Evaluating expense" });
add("threshold", 40, 250, { limit: "1000" });
add("approval", 40, 390);
add("approved", 40, 560);
add("end", 40, 690);
render();
loadFlowList();
loadRuns();
</script>
</body>
</html>

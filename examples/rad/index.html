<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>vmpas — RAD durable workflow</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/pascal/pascal.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.4 system-ui, sans-serif; color: #1b1f24; background: #f5f6f8; }
  header { background: #1b2330; color: #fff; padding: 10px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .sp { flex: 1; }
  header input, header select { padding: 5px 6px; border-radius: 4px; border: 1px solid #3a4658; }
  button { cursor: pointer; border: 0; border-radius: 5px; padding: 6px 11px; font: inherit; background: #2d6cdf; color: #fff; }
  button.alt { background: #475569; } button.ok { background: #1f9d57; } button.no { background: #d14545; }
  #wrap { display: grid; grid-template-columns: 180px 1fr 420px; height: calc(100vh - 50px); }
  #palette { background: #eceef1; border-right: 1px solid #d7dbe0; padding: 10px; overflow: auto; }
  #palette h2 { font-size: 11px; text-transform: uppercase; color: #6b7280; margin: 4px 0 8px; }
  .tool { background: #fff; border: 1px solid #cfd4da; border-radius: 6px; padding: 7px 9px; margin-bottom: 7px; cursor: grab; font-weight: 500; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #999; }
  .tool .del { cursor: pointer; color: #b91c1c; font-weight: 700; opacity: .6; }
  #newComp { width: 100%; margin-top: 6px; }
  #canvas { position: relative; overflow: auto; background:
      linear-gradient(#e9ebee 1px, transparent 1px) 0 0/22px 22px,
      linear-gradient(90deg, #e9ebee 1px, transparent 1px) 0 0/22px 22px, #f5f6f8; }
  svg#edges { position: absolute; inset: 0; width: 4000px; height: 4000px; pointer-events: none; }
  .node { position: absolute; width: 260px; background: #fff; border: 1px solid #cfd4da; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .node.sel { border-color: #2d6cdf; }
  .node .hd { padding: 6px 9px; border-radius: 8px 8px 0 0; color: #fff; font-weight: 600; cursor: grab; display: flex; justify-content: space-between; align-items: center; }
  .node .hd .x { cursor: pointer; opacity: .85; }
  .node .bd { padding: 6px; }
  .node textarea { width: 100%; min-height: 70px; font-family: ui-monospace, monospace; font-size: 11px; border: 1px solid #d7dbe0; border-radius: 5px; padding: 6px; }
  .node[data-status="done"] { box-shadow: 0 0 0 2px #1f9d57; }
  .node[data-status="paused"] { box-shadow: 0 0 0 3px #f59e0b; animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 3px #f59e0b; } 50% { box-shadow: 0 0 0 6px #fde68a; } }
  #side { border-left: 1px solid #d7dbe0; background: #fff; display: flex; flex-direction: column; }
  #side h2 { font-size: 11px; text-transform: uppercase; color: #6b7280; margin: 10px 12px 4px; display: flex; justify-content: space-between; align-items: center; }
  #side h2 button { padding: 3px 8px; font-size: 11px; }
  #side .CodeMirror { height: 200px; border-top: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; font-size: 12px; }
  #prog.fb { display: block; width: 100%; height: 200px; font-family: ui-monospace, monospace; border: 0; border-top: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; padding: 8px; }
  #out { flex: 1; overflow: auto; padding: 10px 12px; white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 12px; }
  #status { padding: 8px 12px; border-top: 1px solid #e5e7eb; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .pill.done { background: #dcfce7; color: #166534; } .pill.paused { background: #fef3c7; color: #92400e; } .pill.error { background: #fee2e2; color: #991b1b; }
  #runs { max-height: 120px; overflow: auto; padding: 0 12px 10px; font-size: 12px; }
  .runrow { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 3px 0; }
  #modal { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; }
  #modal .box { background: #fff; border-radius: 10px; padding: 16px; width: 460px; }
  #modal h3 { margin: 0 0 10px; } #modal input { width: 100%; padding: 6px; margin-bottom: 8px; border: 1px solid #d7dbe0; border-radius: 5px; }
  #modal .CodeMirror, #ncCode.fb { height: 160px; border: 1px solid #d7dbe0; border-radius: 5px; }
  #modal .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
</style>
</head>
<body>
<header>
  <h1>vmpas · RAD durable workflow</h1>
  <input id="flowName" placeholder="program name" value="expense-approval">
  <button class="alt" id="save">💾 Save</button>
  <select id="load"><option value="">Load program…</option></select>
  <span class="sp"></span>
  <label>amount <input id="amount" type="number" value="2500" step="100" style="width:90px"></label>
  <button id="run">▶ Run</button>
</header>

<div id="wrap">
  <div id="palette">
    <h2>Components (drag →)</h2>
    <div id="tools"></div>
    <button id="newComp" class="alt">➕ New component</button>
    <h2>flow order = top → bottom</h2>
  </div>

  <div id="canvas"><svg id="edges"></svg></div>

  <div id="side">
    <h2><span>Composed program</span><button class="alt" id="recompose">↻ from boxes</button></h2>
    <textarea id="prog"></textarea>
    <h2>Output</h2>
    <div id="out">Run the flow to see output…</div>
    <div id="status"></div>
    <h2>Recent runs (SQLite)</h2>
    <div id="runs"></div>
  </div>
</div>

<div id="modal"><div class="box">
  <h3>New component</h3>
  <input id="ncName" placeholder="component name (e.g. Notify)">
  <textarea id="ncCode" placeholder="Pascal code, e.g. WriteLn('hello');"></textarea>
  <div class="row"><button class="alt" id="ncCancel">Cancel</button><button id="ncAdd">Add to palette</button></div>
</div></div>

<script>
// ---- editor abstraction: CodeMirror if present, else plain textarea ---------
function makeEditor(ta, opts) {
  opts = opts || {};
  if (window.CodeMirror) {
    const cm = CodeMirror.fromTextArea(ta, { mode: "text/x-pascal", lineNumbers: !!opts.lineNumbers, readOnly: !!opts.readOnly, viewportMargin: Infinity });
    return { get: () => cm.getValue(), set: v => cm.setValue(v), change: f => cm.on("change", f) };
  }
  ta.classList.add("fb"); ta.readOnly = !!opts.readOnly;
  return { get: () => ta.value, set: v => { ta.value = v; }, change: f => ta.addEventListener("input", f) };
}

// ---- component library (palette), persisted in the browser ------------------
const BUILTIN = [
  { name: "Start",        color: "#1f9d57", fixed: true, code: "outcome := '';" },
  { name: "Log",          color: "#475569", code: "WriteLn('Evaluating expense');" },
  { name: "Threshold",    color: "#b8860b", code: "if amount <= 1000.00 then\n  begin outcome := 'auto-approved'; WriteLn('Auto-approved'); Halt end;" },
  { name: "Approval",     color: "#c0392b", code: "WriteLn('Awaiting approval...');\nSuspend('approval');\nif not approved then\n  begin outcome := 'rejected'; WriteLn('Rejected'); Halt end;" },
  { name: "Set approved", color: "#2d6cdf", code: "outcome := 'approved';\nWriteLn('Approved');" },
  { name: "End",          color: "#0f172a", fixed: true, code: "WriteLn('Result: ', outcome);" },
];
let components = [];
function loadComponents() {
  let custom = [];
  try { custom = JSON.parse(localStorage.getItem("rad.components") || "[]"); } catch (e) {}
  components = BUILTIN.concat(custom.map(c => Object.assign({ custom: true }, c)));
}
function saveComponents() {
  localStorage.setItem("rad.components", JSON.stringify(components.filter(c => c.custom).map(c => ({ name: c.name, color: c.color, code: c.code }))));
}
function compByName(n) { return components.find(c => c.name === n); }

function renderPalette() {
  const t = document.getElementById("tools");
  t.innerHTML = "";
  components.forEach(c => {
    const d = document.createElement("div");
    d.className = "tool"; d.draggable = true; d.style.borderLeftColor = c.color;
    d.innerHTML = "<span>" + c.name + "</span>" + (c.custom ? '<span class="del" title="remove">✕</span>' : "");
    d.addEventListener("dragstart", e => e.dataTransfer.setData("comp", c.name));
    const del = d.querySelector(".del");
    if (del) del.addEventListener("click", () => { components = components.filter(x => x !== c); saveComponents(); renderPalette(); });
    t.appendChild(d);
  });
}

// ---- nodes (each box has its own editable code) ----------------------------
let nodes = [], nid = 0, selected = null;
const canvas = document.getElementById("canvas"), svg = document.getElementById("edges");

function add(compName, x, y, code) {
  const c = compByName(compName) || { color: "#6d28d9", code: "" };
  nodes.push({ id: "n" + (++nid), comp: compName, color: c.color, code: code != null ? code : c.code, x, y, status: "" });
}
function ordered() { return [...nodes].sort((a, b) => a.y - b.y || a.x - b.x); }

function indent(s) { return s.split("\n").map(l => "  " + l).join("\n"); }
function compose() {
  const body = ordered().map(n => indent("Trace('" + n.id + "');\n" + (n.code || "").trim())).join("\n");
  return "program Flow;\nvar amount: Currency; approved: Boolean; outcome: string;\nbegin\n" + body + "\nend.";
}

// ---- composed-program panel (editable; manual wins until "↻ from boxes") ----
const prog = makeEditor(document.getElementById("prog"), { lineNumbers: true });
let manual = false, settingProg = false;
prog.change(() => { if (!settingProg) manual = true; });
function setProgram(v) { settingProg = true; prog.set(v); settingProg = false; }
function refreshProgram() { if (!manual) setProgram(compose()); }
document.getElementById("recompose").onclick = () => { manual = false; setProgram(compose()); };

// ---- rendering --------------------------------------------------------------
function render() {
  const ids = new Set(nodes.map(n => n.id));
  document.querySelectorAll(".node").forEach(el => { if (!ids.has(el.dataset.id)) el.remove(); });
  nodes.forEach(renderNode);
  drawEdges(); refreshProgram();
}
function renderNode(n) {
  let el = document.querySelector('.node[data-id="' + n.id + '"]');
  if (!el) { el = buildNode(n); canvas.appendChild(el); }
  el.style.left = n.x + "px"; el.style.top = n.y + "px";
  el.classList.toggle("sel", selected === n);
  el.dataset.status = n.status || "";
  el.querySelector(".st").textContent = n.status === "done" ? " ✓" : n.status === "paused" ? " ⏸" : "";
}
function buildNode(n) {
  const el = document.createElement("div");
  el.className = "node"; el.dataset.id = n.id;
  const hd = document.createElement("div"); hd.className = "hd"; hd.style.background = n.color;
  hd.innerHTML = '<span>' + n.comp + '<b class="st"></b></span><span class="x" title="delete">✕</span>';
  hd.addEventListener("mousedown", e => startDrag(e, n));
  el.addEventListener("mousedown", () => { selected = n; document.querySelectorAll(".node").forEach(x => x.classList.toggle("sel", x.dataset.id === n.id)); });
  hd.querySelector(".x").addEventListener("click", ev => { ev.stopPropagation(); nodes = nodes.filter(x => x !== n); el.remove(); drawEdges(); refreshProgram(); });
  el.appendChild(hd);
  const bd = document.createElement("div"); bd.className = "bd"; el.appendChild(bd);
  const ta = document.createElement("textarea"); ta.value = n.code || ""; bd.appendChild(ta);
  const ed = makeEditor(ta, {});
  ed.set(n.code || "");
  ed.change(() => { n.code = ed.get(); refreshProgram(); });
  return el;
}
function drawEdges() {
  const seq = ordered(); let s = "";
  for (let i = 0; i + 1 < seq.length; i++) {
    const a = seq[i], b = seq[i + 1], x1 = a.x + 130, y1 = a.y + 64, x2 = b.x + 130, y2 = b.y;
    s += '<path d="M' + x1 + ' ' + y1 + ' C ' + x1 + ' ' + (y1 + 40) + ' ' + x2 + ' ' + (y2 - 40) + ' ' + x2 + ' ' + y2 +
         '" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arr)"/>';
  }
  svg.innerHTML = '<defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#94a3b8"/></marker></defs>' + s;
}

// ---- drag boxes / drop from palette ----------------------------------------
let drag = null;
function startDrag(e, n) { drag = { n, dx: e.clientX - n.x, dy: e.clientY - n.y }; e.preventDefault(); }
window.addEventListener("mousemove", e => {
  if (!drag) return;
  drag.n.x = Math.max(0, e.clientX - drag.dx); drag.n.y = Math.max(0, e.clientY - drag.dy);
  const el = document.querySelector('.node[data-id="' + drag.n.id + '"]');
  el.style.left = drag.n.x + "px"; el.style.top = drag.n.y + "px"; drawEdges();
});
window.addEventListener("mouseup", () => { if (drag) { drag = null; refreshProgram(); } });
canvas.addEventListener("dragover", e => e.preventDefault());
canvas.addEventListener("drop", e => {
  e.preventDefault();
  const comp = e.dataTransfer.getData("comp"); if (!comp) return;
  const r = canvas.getBoundingClientRect();
  add(comp, e.clientX - r.left + canvas.scrollLeft - 130, e.clientY - r.top + canvas.scrollTop - 20);
  render();
});

// ---- new-component modal ----------------------------------------------------
const modal = document.getElementById("modal");
let ncEd = null;
document.getElementById("newComp").onclick = () => {
  document.getElementById("ncName").value = "";
  modal.style.display = "flex";
  if (!ncEd) ncEd = makeEditor(document.getElementById("ncCode"), {});
  ncEd.set("WriteLn('hello from my component');");
};
document.getElementById("ncCancel").onclick = () => modal.style.display = "none";
document.getElementById("ncAdd").onclick = () => {
  const name = document.getElementById("ncName").value.trim();
  if (!name) { alert("name required"); return; }
  components.push({ name, color: "#6d28d9", code: ncEd.get(), custom: true });
  saveComponents(); renderPalette(); modal.style.display = "none";
};

// ---- run / resume + live highlight -----------------------------------------
const out = document.getElementById("out"), statusEl = document.getElementById("status");
let pausedId = null;
async function post(url, body) {
  const r = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  return r.json();
}
function clearStatus() { nodes.forEach(n => n.status = ""); nodes.forEach(renderNode); }
function markTrace(trace, paused) {
  (trace || []).forEach(id => { const n = nodes.find(x => x.id === id); if (n) n.status = "done"; });
  if (paused && trace && trace.length) { const n = nodes.find(x => x.id === trace[trace.length - 1]); if (n) n.status = "paused"; }
  nodes.forEach(renderNode);
}
function show(res) {
  out.textContent = res.output || "(no output)";
  markTrace(res.trace, res.status === "paused");
  if (res.status === "paused") {
    pausedId = res.id;
    statusEl.innerHTML = '<span class="pill paused">paused: ' + res.tag + '</span> <button class="ok" id="ap">Approve</button> <button class="no" id="rj">Reject</button>';
    document.getElementById("ap").onclick = () => decide(true);
    document.getElementById("rj").onclick = () => decide(false);
  } else if (res.status === "error") {
    statusEl.innerHTML = '<span class="pill error">error</span> ' + (res.error || "");
  } else {
    statusEl.innerHTML = '<span class="pill done">done</span> outcome: <b>' + (res.outcome || "—") + '</b>';
  }
  loadRuns();
}
async function decide(ok) { statusEl.textContent = "resuming…"; show(await post("/api/resume", { id: pausedId, approved: ok })); }
document.getElementById("run").onclick = async () => {
  statusEl.textContent = "running…"; pausedId = null; clearStatus();
  const amount = parseFloat(document.getElementById("amount").value) || 0;
  show(await post("/api/run", { program: prog.get(), amount, flow: document.getElementById("flowName").value.trim() }));
};

// ---- save / load programs (SQLite via backend) -----------------------------
async function saveFlow() {
  await post("/api/flows", { name: document.getElementById("flowName").value.trim() || "untitled", graph: JSON.stringify({ nodes }) });
  loadFlowList();
}
async function loadFlowList() {
  const list = await (await fetch("/api/flows")).json();
  document.getElementById("load").innerHTML = '<option value="">Load program…</option>' + list.map(f => '<option>' + f.name + '</option>').join("");
}
async function loadFlow(name) {
  if (!name) return;
  const g = await (await fetch("/api/flow?name=" + encodeURIComponent(name))).json();
  document.querySelectorAll(".node").forEach(e => e.remove());
  nodes = (g.nodes || []).map(n => Object.assign({ status: "" }, n));
  nid = nodes.reduce((m, n) => Math.max(m, +String(n.id).slice(1) || 0), 0);
  document.getElementById("flowName").value = name; manual = false;
  render();
}
async function loadRuns() {
  const list = await (await fetch("/api/runs")).json();
  document.getElementById("runs").innerHTML = list.map(r =>
    '<div class="runrow"><span>' + (r.flow || "(prog)") + ' · <b>' + r.status + '</b> ' + (r.outcome || "") + '</span><span style="color:#94a3b8">' + (r.created || "").slice(11, 19) + '</span></div>'
  ).join("") || '<span style="color:#94a3b8">no runs yet</span>';
}
document.getElementById("save").onclick = saveFlow;
document.getElementById("load").onchange = e => loadFlow(e.target.value);

// ---- boot -------------------------------------------------------------------
loadComponents(); renderPalette();
add("Start", 40, 20); add("Log", 40, 120); add("Threshold", 40, 240);
add("Approval", 40, 380); add("Set approved", 40, 560); add("End", 40, 700);
render(); loadFlowList(); loadRuns();
</script>
</body>
</html>
